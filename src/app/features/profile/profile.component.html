<div class="profile-wrapper">
    @if(!isEditMode()){
    <app-profile-view [user]="user()" [totalFavorites]="totalFavorites" (edit)="onEdit()"></app-profile-view>
    }@else{
    <app-profile-edit [user]="user()" [isLoading]="isLoading()" (save)="onSave($event)" (cancel)="onCancel()"></app-profile-edit>
    }
</div>
