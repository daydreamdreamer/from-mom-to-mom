<a class="slide" [class.active]="active" [routerLink]="['/recipes', recipe._id]">
    <img [src]="recipe.image" />
    <div class="content">
        <p>{{ recipe.category }}</p>
        <h1>{{ recipe.recipeName }}</h1>
        <p><i class="fa-regular fa-clock"></i>
            {{ recipe.cookingTime }}
        </p>
    </div>
</a>
