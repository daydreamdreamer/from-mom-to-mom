<div class="user-card">
    <div class="user-name">{{ user.firstName }} {{user.lastName}}</div>
    <div class="city">{{ user.cityId | cityName }}</div>
    <div class="avatar-wrapper">
        <img [src]="user.profilePic" alt="user" class="avatar" />
        <app-favorites [user]="user">
        </app-favorites>
    </div>
</div>
